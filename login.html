<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Street — Iniciar sesión</title>
  <link rel="stylesheet" href="css/1.css"/>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
 
<div class="auth-page">
  <div class="auth-card">
 
    <div class="auth-logo">NOVA STREET</div>
    <div class="auth-sub">Inicia sesión para continuar</div>
 
    <form id="formLogin">
      <div class="field">
        <label for="correoLogin">Correo electrónico</label>
        <input type="email" id="correoLogin" placeholder="tu@correo.com" required/>
        <div class="mensaje error" id="error-correo-login"></div>
      </div>
      <div class="field">
        <label for="claveLogin">Contraseña</label>
        <input type="password" id="claveLogin" placeholder="••••••••" required/>
        <div class="mensaje error" id="error-clave-login"></div>
      </div>
      <button type="submit" class="auth-btn">Iniciar sesión</button>
    </form>
 
    <p class="auth-msg" id="mensajeLogin"></p>
 
    <div class="divider">o</div>
 
    <div class="auth-footer">
      ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
    </div>
 
  </div>
</div>
 
<script src="js/shared.js"></script>
<script src="js/login.js"></script>
</body>
</html>
