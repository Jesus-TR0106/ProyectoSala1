<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Street — Crear cuenta</title>
  <link rel="stylesheet" href="css/1.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.07);
    }
    .auth-logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .auth-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 2rem;
    }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: var(--accent-hover); }
    .auth-msg {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      min-height: 1.4rem;
      margin-top: 1rem;
    }
    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-tertiary);
      margin-top: 1.5rem;
    }
    .auth-footer a {
      color: var(--coral);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
      color: var(--text-tertiary);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }
  </style>
</head>
<body>
 
<div class="auth-page">
  <div class="auth-card">
 
    <div class="auth-logo">NOVA STREET</div>
    <div class="auth-sub">Crea tu cuenta gratuita</div>
 
    <form id="formRegistro">
      <div class="field">
        <label for="nombreRegistro">Nombre completo</label>
        <input type="text" id="nombreRegistro" placeholder="Tu nombre" required/>
      </div>
      <div class="field">
        <label for="correoRegistro">Correo electrónico</label>
        <input type="email" id="correoRegistro" placeholder="tu@correo.com" required/>
      </div>
      <div class="field">
        <label for="claveRegistro">Contraseña</label>
        <input type="password" id="claveRegistro" placeholder="Mínimo 6 caracteres" required/>
      </div>
      <button type="submit" class="auth-btn">Crear cuenta</button>
    </form>
 
    <p class="auth-msg" id="mensajeRegistro"></p>
 
    <div class="divider">o</div>
 
    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
 
  </div>
</div>
 
<script src="js/registro.js"></script>
</body>
</html>
