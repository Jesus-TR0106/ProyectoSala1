<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Street — Crear cuenta</title>
  <link rel="stylesheet" href="css/1.css"/>
  <link rel="stylesheet" href="css/registro.css">
</head>
<body>
 
<div class="auth-page">
  <div class="auth-card">
 
    <div class="auth-logo">NOVA STREET</div>
    <div class="auth-sub">Crea tu cuenta gratuita</div>
 
    <form id="formRegistro">
      <div class="field">
        <label for="nombreRegistro">Nombre completo</label>
        <input type="text" id="nombreRegistro" placeholder="Tu nombre" required/>
      </div>
      <div class="field">
        <label for="correoRegistro">Correo electrónico</label>
        <input type="email" id="correoRegistro" placeholder="tu@correo.com" required/>
      </div>
      <div class="field">
        <label for="claveRegistro">Contraseña</label>
        <input type="password" id="claveRegistro" placeholder="Mínimo 6 caracteres" required/>
      </div>
      <button type="submit" class="auth-btn">Crear cuenta</button>
    </form>
 
    <p class="auth-msg" id="mensajeRegistro"></p>
 
    <div class="divider">o</div>
 
    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
 
  </div>
</div>
 
<script src="js/registro.js"></script>
</body>
</html>
