<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Street — Carrito</title>
  <link rel="stylesheet" href="css/1.css"/>
  <link rel="stylesheet" href="css/carrito.css">
<body>
 
<!-- NAVBAR -->
<nav>
  <img src="img/loguito.2.png" class="loguito" alt="Nova Street"/>
  <ul class="nav-links">
    <li><a href="Proyecto.html">Inicio</a></li>
    <li><a href="Mujeres.html">Mujer</a></li>
    <li><a href="Hombres.html">Hombre</a></li>
    <li><a href="nuestrastiendas.html">Tiendas</a></li>
  </ul>
  <div class="nav-right">
    <span class="nav-user" id="nombreUsuario"></span>
    <button class="icon-btn" id="btnSesion" title="Sesión"></button>
  </div>
</nav>
 
<!-- PROMO BAR -->
<div class="promo-bar">
  Envío gratis en compras mayores a S/ 199 &nbsp;·&nbsp; Usa el código: <strong>ENVINOVA10</strong>
</div>
 
<!-- CONTENIDO CARRITO -->
<div class="carrito-page">
 
  <!-- Columna izquierda: lista -->
  <div>
    <h1 class="carrito-titulo">Tu carrito</h1>
    <div id="listaCarrito"></div>
  </div>
 
  <!-- Columna derecha: resumen -->
  <aside class="resumen">
    <h2>RESUMEN DEL PEDIDO</h2>
 
    <div class="resumen-fila">
      <span>Subtotal (<span id="totalQty">0</span> productos)</span>
      <span id="subtotalMonto">S/ 0.00</span>
    </div>
    <div class="resumen-fila">
      <span>Envío</span>
      <span id="costoEnvio">S/ 0.00</span>
    </div>
    <div class="resumen-fila total">
      <span>Total</span>
      <span id="totalMonto">S/ 0.00</span>
    </div>
 
    <div class="promo-input">
      <input type="text" id="codigoPromo" placeholder="Código de descuento"/>
      <button onclick="aplicarPromo()">Aplicar</button>
    </div>
 
    <button class="btn-checkout" id="btnCheckout">Finalizar compra</button>
    <button class="btn-seguir" onclick="window.location.href='Proyecto.html'">← Seguir comprando</button>
 
    <!-- Formulario de envío -->
    <form class="envio-form" id="formEnvio">
      <h3>Datos de envío</h3>
      <div class="field">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" placeholder="Av. Arequipa 123, Lima" required/>
        <div class="mensaje error" id="error-direccion"></div>
      </div>
      <div class="field">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="987654321" required/>
        <div class="mensaje error" id="error-telefono"></div>
      </div>
      <button type="submit" class="btn-confirmar">Confirmar pedido ✓</button>
    </form>
 
    <p id="mensajeCarrito"></p>
  </aside>
 
</div>
 
<script src="js/shared.js"></script>
<script src="js/carrito.js"></script>
</body>
</html>
