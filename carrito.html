<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Street — Carrito</title>
  <link rel="stylesheet" href="css/1.css"/>
  <style>
    /* ── Layout principal ── */
    .carrito-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .carrito-page { grid-template-columns: 1fr; }
    }
 
    /* ── Título ── */
    .carrito-titulo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 1.75rem;
      color: var(--text-primary);
    }
 
    /* ── Tabla de productos ── */
    .carrito-vacio {
      font-size: 14px;
      color: var(--text-tertiary);
      padding: 2rem 0;
    }
    .carrito-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1.1rem 0;
      border-bottom: 0.5px solid var(--border);
    }
    .item-img {
      width: 80px; height: 80px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-info { display: flex; flex-direction: column; gap: 4px; }
    .item-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .item-cat  { font-size: 12px; color: var(--text-tertiary); }
    .item-price { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-top: 4px; }
    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }
    .item-subtotal { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 0.5px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--bg-secondary); }
    .qty-num-c { font-size: 14px; font-weight: 600; min-width: 18px; text-align: center; }
    .btn-eliminar {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--text-tertiary);
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-eliminar:hover { color: var(--coral); }
 
    /* ── Panel resumen ── */
    .resumen {
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      position: sticky;
      top: 80px;
      background: var(--bg-primary);
    }
    .resumen h2 { font-size: 15px; font-weight: 600; letter-spacing: 1px; margin-bottom: 1.25rem; }
    .resumen-fila {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .resumen-fila.total {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      border-top: 0.5px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }
    .promo-input {
      display: flex;
      gap: 8px;
      margin: 1.25rem 0;
    }
    .promo-input input {
      flex: 1;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--bg-secondary);
    }
    .promo-input input:focus { border-color: var(--accent); }
    .promo-input button {
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-checkout {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-checkout:hover { background: var(--accent-hover); }
    .btn-seguir {
      width: 100%;
      padding: 12px;
      background: none;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: inherit;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }
    .btn-seguir:hover { background: var(--bg-secondary); }
 
    /* ── Formulario de envío (oculto hasta checkout) ── */
    .envio-form {
      display: none;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid var(--border);
    }
    .envio-form.activo { display: block; }
    .envio-form h3 { font-size: 13px; font-weight: 600; letter-spacing: 1px; margin-bottom: 1rem; text-transform: uppercase; }
    .envio-form .field { margin-bottom: 0.75rem; }
    .envio-form .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .envio-form .field input {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .envio-form .field input:focus { border-color: var(--accent); }
    .btn-confirmar {
      width: 100%;
      padding: 13px;
      background: #0F6E56;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-confirmar:hover { background: #0a5240; }
 
    /* ── Mensaje feedback ── */
    #mensajeCarrito {
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.2rem;
    }
 
    /* ── Usuario navbar ── */
    .nav-user { font-size: 13px; color: var(--text-secondary); }
  </style>
</head>
<body>
 
<!-- NAVBAR -->
<nav>
  <img src="img/loguito.2.png" class="loguito" alt="Nova Street"/>
  <ul class="nav-links">
    <li><a href="index.html">Mujer</a></li>
    <li><a href="Hombres.html">Hombre</a></li>
    <li><a href="#">Colecciones</a></li>
    <li><a href="#">Ofertas</a></li>
  </ul>
  <div class="nav-right">
    <span class="nav-user" id="nombreUsuario"></span>
    <button class="icon-btn" id="btnSesion" title="Sesión"></button>
  </div>
</nav>
 
<!-- PROMO BAR -->
<div class="promo-bar">
  Envío gratis en compras mayores a S/ 199 &nbsp;·&nbsp; Usa el código: <strong>ENVINOVA10</strong>
</div>
 
<!-- CONTENIDO CARRITO -->
<div class="carrito-page">
 
  <!-- Columna izquierda: lista -->
  <div>
    <h1 class="carrito-titulo">Tu carrito</h1>
    <div id="listaCarrito"></div>
  </div>
 
  <!-- Columna derecha: resumen -->
  <aside class="resumen">
    <h2>RESUMEN DEL PEDIDO</h2>
 
    <div class="resumen-fila">
      <span>Subtotal (<span id="totalQty">0</span> productos)</span>
      <span id="subtotalMonto">S/ 0.00</span>
    </div>
    <div class="resumen-fila">
      <span>Envío</span>
      <span id="costoEnvio">S/ 0.00</span>
    </div>
    <div class="resumen-fila total">
      <span>Total</span>
      <span id="totalMonto">S/ 0.00</span>
    </div>
 
    <div class="promo-input">
      <input type="text" id="codigoPromo" placeholder="Código de descuento"/>
      <button onclick="aplicarPromo()">Aplicar</button>
    </div>
 
    <button class="btn-checkout" id="btnCheckout">Finalizar compra</button>
    <button class="btn-seguir" onclick="window.location.href='index.html'">← Seguir comprando</button>
 
    <!-- Formulario de envío -->
    <form class="envio-form" id="formEnvio">
      <h3>Datos de envío</h3>
      <div class="field">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" placeholder="Av. Arequipa 123, Lima" required/>
      </div>
      <div class="field">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="987654321" required/>
      </div>
      <button type="submit" class="btn-confirmar">Confirmar pedido ✓</button>
    </form>
 
    <p id="mensajeCarrito"></p>
  </aside>
 
</div>
 
<script src="js/carrito.js"></script>
</body>
</html>
